name: CI
on:
  push:
    paths: "src/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  BUILD:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: go.work
      - uses: actions/checkout@v4
      - name: Test compile
        run: make build_test
      - name: Test Use
        timeout-minutes: 5
        run: bash tests/pull_license.bash
